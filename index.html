<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">

  <title>juju is so cool</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

<div id="pinkWorld">

  <!-- TOP CLOUDS -->
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>

  <!-- LEFT CLOUDS -->
  <div class="cloud c3">☁️</div>
  <div class="cloud c4">☁️</div>
  <div class="cloud c5">☁️</div>
  <div class="cloud c6">☁️</div>
  <div class="cloud c7">☁️</div>

  <!-- RIGHT CLOUDS -->
  <div class="cloud c8">☁️</div>
  <div class="cloud c9">☁️</div>
  <div class="cloud c10">☁️</div>
  <div class="cloud c11">☁️</div>
  <div class="cloud c12">☁️</div>

  <!-- BOTTOM CLOUDS -->
  <div class="cloud c13">☁️</div>
  <div class="cloud c14">☁️</div>

  <!-- STRAWBERRY -->

  <div id="strawberrySection">

    <div id="strawberry" onclick="revealBirthday()">
      🍓
    </div>

    <p class="clickText">
      tap on it gng &lt;3!
    </p>

  </div>

</div>

<div id="transitionScreen"></div>

<!-- BIRTHDAY SCREEN -->

<div id="birthdayScreen">

  <!-- WATERMELON FIRST -->

  <div id="watermelonArea">

    <div id="watermelon">
      🍉
    </div>

    <div id="knife">
      🔪
    </div>

  </div>

  <!-- HIDDEN UNTIL WATERMELON IS CUT -->

  <div id="birthdayContent">

    <!-- Sparkles -->

    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">✨</div>
    <div class="sparkle s3">✨</div>
    <div class="sparkle s4">✨</div>
    <div class="sparkle s5">✨</div>

    <!-- Balloons -->

    <div class="balloon b1">🎈</div>
    <div class="balloon b2">🎈</div>
    <div class="balloon b3">🎈</div>
    <div class="balloon b4">🎈</div>
    <div class="balloon b5">🎈</div>
    <div class="balloon b6">🎈</div>

    <h1>🎂 HAPPY BIRTHDAY PREETHAM!!! 🎂</h1>

    <p>
      happy 20 grandpaa!!
    </p>

    <img
      id="mainPhoto"
      src="https://i.postimg.cc/D0dYcxB4/d3a84d1f-d11d-49be-8cba-c12052c0e8c3.png"
      alt="Birthday Photo"
    />

  </div>

</div>

<audio id="birthdayMusic">
  <source src="https://www.orangefreesounds.com/wp-content/uploads/2016/08/Happy-birthday-instrumental.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
